[features]
codex_hooks = true

[hooks]
SessionStart = [
  { hooks = [
    { type = "command", command = 'powershell.exe -NoProfile -ExecutionPolicy Bypass -File "p:\StandPulse\hooks\codex-hook-log.ps1"', timeout = 10 }
  ] }
]

UserPromptSubmit = [
  { hooks = [
    { type = "command", command = 'powershell.exe -NoProfile -ExecutionPolicy Bypass -File "p:\StandPulse\hooks\codex-hook-log.ps1"', timeout = 10 }
  ] }
]

Stop = [
  { hooks = [
    { type = "command", command = 'powershell.exe -NoProfile -ExecutionPolicy Bypass -File "p:\StandPulse\hooks\codex-hook-log.ps1"', timeout = 10 }
  ] }
]
